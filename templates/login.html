{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block body %}
<div class="container my-4" style="max-width: 520px;">
  <h2 class="mb-4">Login</h2>

  {% if error %}
    <div class="alert alert-danger" role="alert">{{ error }}</div>
  {% endif %}

  <form action="/login" method="POST" class="p-4 rounded"
        style="background-color: #1a1a1a; box-shadow: 0 0 12px rgba(255,255,255,0.08);">

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" required>
    </div>

    <button type="submit" class="btn btn-info">Login</button>
    <a class="btn btn-link text-info" href="/register">Create account</a>
  </form>
</div>
{% endblock %}
