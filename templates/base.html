<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% block title %}
      {% endblock %} - To-Do-List App
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            font-family: "Segoe UI", sans-serif;
        }

        .navbar-dark {
            background-color: #1a1a1a !important;
        }

        .navbar-brand, .nav-link {
            color: #e0e0e0 !important;
        }

        .nav-link:hover {
            color: #00c8ff !important;
        }

        .content-container {
            padding: 30px;
        }

        .todo-completed .todo-text {
          text-decoration: line-through;
          color: #9aa0a6;
        }

        .todo-checkbox {
          cursor: pointer;
          transform: scale(1.1);
        }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">

        <a class="navbar-brand" href="/">Todo App</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">

            <li class="nav-item">
              <a class="nav-link active" href="/">Home</a>
            </li>

            {% if current_user %}
            <li class="nav-item">
              <span class="nav-link">Hi, {{ current_user.username }}</span>
            </li>
            {% endif %}

          </ul>

          <div class="d-flex">
            {% if current_user %}
              <a class="btn btn-outline-info" href="/logout">Logout</a>
            {% else %}
              <a class="btn btn-outline-info me-2" href="/login">Login</a>
              <a class="btn btn-info" href="/register">Sign Up</a>
            {% endif %}
          </div>
        </div>

      </div>
    </nav>

    <div class="content-container">
      {% block body %}
      {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
